<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#070710"/>
  <!-- Four pillars: top-left, top-right, bottom-left, bottom-right -->
  <!-- Pillar 1: Wood (top-left) -->
  <rect x="6" y="6" width="9" height="9" rx="2" fill="#5aad68" opacity="0.9"/>
  <!-- Pillar 2: Fire (top-right) -->
  <rect x="17" y="6" width="9" height="9" rx="2" fill="#e85d4a" opacity="0.9"/>
  <!-- Pillar 3: Earth (bottom-left) -->
  <rect x="6" y="17" width="9" height="9" rx="2" fill="#c49a6c" opacity="0.9"/>
  <!-- Pillar 4: Metal (bottom-right) -->
  <rect x="17" y="17" width="9" height="9" rx="2" fill="#9e9e9e" opacity="0.9"/>
  <!-- Golden center dot -->
  <circle cx="16" cy="16" r="3" fill="#d4a574"/>
</svg>
