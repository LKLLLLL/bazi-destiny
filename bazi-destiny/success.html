<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful - BaZi Destiny</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #070710 0%, #0d0d1a 100%);
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .success-card {
      background: linear-gradient(145deg, rgba(212, 165, 116, 0.1), rgba(212, 165, 116, 0.02));
      border: 1px solid rgba(212, 165, 116, 0.3);
      border-radius: 24px;
      padding: 48px;
      text-align: center;
      max-width: 480px;
      animation: fadeIn 0.6s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .icon {
      font-size: 72px;
      margin-bottom: 24px;
      animation: bounce 0.8s ease-out;
    }
    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    h1 {
      font-size: 28px;
      margin-bottom: 16px;
      color: #d4a574;
    }
    p {
      font-size: 16px;
      color: rgba(245, 245, 245, 0.8);
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .btn-primary {
      background: linear-gradient(135deg, #d4a574 0%, #c49464 100%);
      color: #070710;
      border: none;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(212, 165, 116, 0.3);
    }
    .features {
      text-align: left;
      margin: 24px 0;
      padding: 20px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
    }
    .features div {
      padding: 8px 0;
      color: rgba(245, 245, 245, 0.7);
    }
    .features span {
      color: #5dba7d;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="success-card">
    <div class="icon">✨</div>
    <h1>Payment Successful!</h1>
    <p>Thank you for unlocking Destiny Master. Your complete BaZi reading is now available.</p>
    <div class="features">
      <div><span>✓</span> Full 12-section BaZi reading</div>
      <div><span>✓</span> Personalized Feng Shui analysis</div>
      <div><span>✓</span> Lucky numbers, colors & directions</div>
      <div><span>✓</span> PDF report download</div>
    </div>
    <a href="/" class="btn-primary" onclick="localStorage.setItem('proUnlocked', 'true')">🔮 View My Reading</a>
  </div>
</body>
</html>
